<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CaratLane — East Region Store Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f1; color: #1a1a1a; }
  header { padding: 16px 20px 12px; background: #fff; border-bottom: 1px solid #e5e3de; }
  h1 { font-size: 17px; font-weight: 600; }
  .sub { font-size: 12px; color: #777; margin-top: 2px; }
  .controls { padding: 10px 20px; background: #fff; border-bottom: 1px solid #e5e3de; display: flex; gap: 20px; align-items: flex-start; flex-wrap: wrap; }
  .filter-group label { font-size: 11px; color: #888; font-weight: 500; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .btns { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 16px; border: 1.5px solid #d1d5db; background: #fff; color: #333; cursor: pointer; font-family: inherit; transition: all 0.12s; white-space: nowrap; }
  .filter-btn:hover { border-color: #7c3aed; color: #7c3aed; }
  .filter-btn.active { background: #7c3aed; color: #fff; border-color: #7c3aed; }
  .legend-group label { font-size: 11px; color: #888; font-weight: 500; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.04em; }
  .legend { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #444; }
  .dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; flex-shrink: 0; border: 1.5px solid rgba(0,0,0,0.15); }
  #map { height: calc(100vh - 195px); min-height: 400px; }
  .stats-bar { display: flex; gap: 0; border-top: 1px solid #e5e3de; background: #fff; }
  .stat { padding: 10px 20px; border-right: 1px solid #e5e3de; font-size: 12px; }
  .stat-label { color: #888; font-size: 11px; }
  .stat-val { font-weight: 600; font-size: 15px; margin-top: 1px; }
  .stat-sub { font-size: 11px; margin-top: 1px; }
  .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
</style>
</head>
<body>

<header>
  <h1>CaratLane — East Region Store Performance</h1>
  <p class="sub">67 stores across 5 regions &nbsp;·&nbsp; Revenue in Crores &nbsp;·&nbsp; Click any dot for details</p>
</header>

<div class="controls">
  <div class="filter-group">
    <label>Filter by region</label>
    <div class="btns">
      <button class="filter-btn active" id="btn-All"       onclick="setRegion('All')">All regions</button>
      <button class="filter-btn"        id="btn-EWB1"      onclick="setRegion('EWB 1')">EWB 1 — West Bengal A</button>
      <button class="filter-btn"        id="btn-EWB2"      onclick="setRegion('EWB 2')">EWB 2 — West Bengal B</button>
      <button class="filter-btn"        id="btn-Jharkhand" onclick="setRegion('Jharkhand')">Jharkhand</button>
      <button class="filter-btn"        id="btn-ENE"       onclick="setRegion('ENE')">ENE — Northeast</button>
      <button class="filter-btn"        id="btn-EOC"       onclick="setRegion('EOC')">EOC — Odisha / CG</button>
    </div>
  </div>
  <div class="legend-group">
    <label>Revenue bucket</label>
    <div class="legend">
      <span class="legend-item"><span class="dot" style="background:#dc2626"></span>Less than 6 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#ea580c"></span>6 – 10 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#d97706"></span>10 – 15 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#16a34a"></span>15 – 20 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#2563eb"></span>20 – 25 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#7c3aed"></span>25 – 30 Cr</span>
      <span class="legend-item"><span class="dot" style="background:#111827"></span>30 Cr & above</span>
    </div>
  </div>
</div>

<div id="map"></div>

<div class="stats-bar" id="statsBar">
  <div class="stat"><div class="stat-label">Stores</div><div class="stat-val" id="s-count">—</div></div>
  <div class="stat"><div class="stat-label">Total revenue</div><div class="stat-val" id="s-total">—</div></div>
  <div class="stat"><div class="stat-label">Avg / store</div><div class="stat-val" id="s-avg">—</div></div>
  <div class="stat"><div class="stat-label">Top store</div><div class="stat-val" id="s-top" style="font-size:13px">—</div><div class="stat-sub" id="s-top-v"></div></div>
  <div class="stat"><div class="stat-label">Lowest store</div><div class="stat-val" id="s-low" style="font-size:13px">—</div><div class="stat-sub" id="s-low-v"></div></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

const REGION_VIEW = {
  'All':       { center: [22.5, 87.5], zoom: 5 },
  'EWB 1':     { center: [22.8, 88.2], zoom: 9 },
  'EWB 2':     { center: [22.7, 88.3], zoom: 9 },
  'Jharkhand': { center: [23.2, 85.8], zoom: 8 },
  'ENE':       { center: [26.0, 91.5], zoom: 6 },
  'EOC':       { center: [20.8, 83.5], zoom: 7 }
};

function bucketColor(v) {
  if (v < 6)  return '#dc2626';
  if (v < 10) return '#ea580c';
  if (v < 15) return '#d97706';
  if (v < 20) return '#16a34a';
  if (v < 25) return '#2563eb';
  if (v < 30) return '#7c3aed';
  return '#111827';
}

function bucketLabel(v) {
  if (v < 6)  return '< 6 Cr';
  if (v < 10) return '6–10 Cr';
  if (v < 15) return '10–15 Cr';
  if (v < 20) return '15–20 Cr';
  if (v < 25) return '20–25 Cr';
  if (v < 30) return '25–30 Cr';
  return '30+ Cr';
}

function makeIcon(color, size) {
  const s = size || 14;
  return L.divIcon({
    html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.35);"></div>`,
    className: '',
    iconSize: [s, s],
    iconAnchor: [s/2, s/2],
    popupAnchor: [0, -s/2]
  });
}

const map = L.map('map', { zoomControl: true }).setView([22.5, 87.5], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 18
}).addTo(map);

let markers = [];
let activeRegion = 'All';

function renderMarkers(region) {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  const visible = region === 'All' ? STORES : STORES.filter(s => s.r === region);
  visible.forEach(s => {
    const color = bucketColor(s.v);
    const m = L.marker([s.lat, s.lng], { icon: makeIcon(color, 16) }).addTo(map);
    m.bindPopup(`
      <div style="min-width:170px;">
        <div style="font-weight:700;font-size:14px;margin-bottom:2px;">${s.c}</div>
        <div style="color:#555;font-size:12px;margin-bottom:8px;">${s.n}</div>
        <div style="font-size:18px;font-weight:700;color:${color};">${s.v.toFixed(2)} Cr</div>
        <div style="font-size:11px;margin-top:3px;"><span style="background:${color};color:#fff;padding:2px 8px;border-radius:10px;font-size:11px;">${bucketLabel(s.v)}</span> &nbsp; ${s.r}</div>
      </div>
    `, { maxWidth: 220 });
    markers.push(m);
  });
  updateStats(visible);
}

function updateStats(visible) {
  const total = visible.reduce((a, s) => a + s.v, 0);
  const avg = total / visible.length;
  const sorted = visible.slice().sort((a, b) => b.v - a.v);
  const top = sorted[0], low = sorted[sorted.length - 1];
  document.getElementById('s-count').textContent = visible.length;
  document.getElementById('s-total').textContent = total.toFixed(1) + ' Cr';
  document.getElementById('s-avg').textContent = avg.toFixed(1) + ' Cr';
  document.getElementById('s-top').textContent = top.n;
  document.getElementById('s-top-v').innerHTML = `<span style="color:${bucketColor(top.v)};font-weight:600">${top.v} Cr</span>`;
  document.getElementById('s-low').textContent = low.n;
  document.getElementById('s-low-v').innerHTML = `<span style="color:${bucketColor(low.v)};font-weight:600">${low.v} Cr</span>`;
}

function setRegion(region) {
  activeRegion = region;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  const idMap = {
    'All':'btn-All', 'EWB 1':'btn-EWB1', 'EWB 2':'btn-EWB2',
    'Jharkhand':'btn-Jharkhand', 'ENE':'btn-ENE', 'EOC':'btn-EOC'
  };
  const el = document.getElementById(idMap[region]);
  if (el) el.classList.add('active');
  renderMarkers(region);
  const v = REGION_VIEW[region] || REGION_VIEW['All'];
  map.flyTo(v.center, v.zoom, { duration: 0.8 });
}

renderMarkers('All');
</script>

</html>
