<!DOCTYPE html>

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f7f4;color:#1a1a1a;padding:20px;}
  h1{font-size:18px;font-weight:600;margin-bottom:4px;}
  .sub{font-size:13px;color:#666;margin-bottom:14px;}
  .filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .filters span{font-size:12px;color:#888;margin-right:2px;}
  .filter-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid #d1d5db;background:#fff;color:#333;cursor:pointer;font-family:inherit;transition:all 0.15s;}
  .filter-btn:hover{border-color:#7c3aed;color:#7c3aed;}
  .filter-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed;}
  .legend{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;align-items:center;}
  .legend span{font-size:12px;color:#444;display:flex;align-items:center;gap:5px;}
  .dot{width:12px;height:12px;border-radius:50%;display:inline-block;flex-shrink:0;}
  .map-wrap{position:relative;background:#e8f4f8;border-radius:12px;border:1px solid #e0ddd8;overflow:hidden;}
  canvas{width:100%;display:block;cursor:crosshair;}
  #tooltip{position:absolute;display:none;background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:9px 13px;font-size:12px;pointer-events:none;max-width:210px;box-shadow:0 4px 16px rgba(0,0,0,0.10);}
  .stats{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap;}
  .stat{background:#fff;border:1px solid #e5e7eb;border-radius:8px;padding:10px 16px;font-size:12px;min-width:100px;}
  .stat-label{color:#888;font-size:11px;margin-bottom:3px;}
  .stat-val{font-weight:600;font-size:16px;}
  .stat-sub{font-size:11px;color:#888;margin-top:2px;}
</style>

function proj(lat,lng){
  const x=(lng-GEO.minLng)/(GEO.maxLng-GEO.minLng)*W;
  const y=(1-(lat-GEO.minLat)/(GEO.maxLat-GEO.minLat))*H;
  return[x,y];
}

const COLOR=v=>{
  if(v<6)return'#dc2626';
  if(v<10)return'#ea580c';
  if(v<15)return'#ca8a04';

  if(v<25)return'#2563eb';

};
const LABEL=v=>{
  if(v<6)return'< 6 Cr';
  if(v<10)return'6–10 Cr';
  if(v<15)return'10–15 Cr';
  if(v<20)return'15–20 Cr';
  if(v<25)return'20–25 Cr';

};

const canvas=document.getElementById('mapCanvas');
const ctx=canvas.getContext('2d');
let plotted=[];

function drawMap(filterRegion){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#ddeef5';
  ctx.fillRect(0,0,W,H);

  Object.entries(STATE_PATHS).forEach(([k,pts])=>{
    ctx.beginPath();
    pts.forEach(([lat,lng],i)=>{
      const[x,y]=proj(lat,lng);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.closePath();
    ctx.fillStyle='#f2efe9';
    ctx.fill();
    ctx.strokeStyle='#c5c0b8';
    ctx.lineWidth=1;
    ctx.stroke();
  });

  if(filterRegion!=='All'&&REGION_BOUNDS[filterRegion]){
    const[mlat,xlat,mlng,xlng]=REGION_BOUNDS[filterRegion];
    const[x1,y1]=proj(xlat,mlng);
    const[x2,y2]=proj(mlat,xlng);
    ctx.fillStyle=REGION_FILL[filterRegion]||'rgba(100,100,200,0.1)';
    ctx.fillRect(x1,y1,x2-x1,y2-y1);
    ctx.strokeStyle='rgba(80,80,180,0.25)';
    ctx.lineWidth=1.5;
    ctx.strokeRect(x1,y1,x2-x1,y2-y1);
  }

  ctx.font='bold 11px -apple-system,sans-serif';
  ctx.fillStyle='rgba(100,90,78,0.55)';
  ctx.textAlign='center';
  STATE_LABELS.forEach(({label,lat,lng})=>{
    const[x,y]=proj(lat,lng);
    ctx.fillText(label,x,y);
  });

  plotted=[];
  const used=[];
  const visible=filterRegion==='All'?STORES:STORES.filter(s=>s.r===filterRegion);

  visible.forEach(s=>{
    let[px,py]=proj(s.lat,s.lng);
    let ox=0,oy=0,tries=0;
    while(tries<24){
      const conflict=used.find(([ux,uy])=>Math.abs(ux-(px+ox))<10&&Math.abs(uy-(py+oy))<10);
      if(!conflict)break;
      const angle=(tries*137.5)*Math.PI/180;
      const rr=11+Math.floor(tries/6)*11;
      ox=Math.cos(angle)*rr;oy=Math.sin(angle)*rr;
      tries++;
    }
    px+=ox;py+=oy;
    used.push([px,py]);

    const col=COLOR(s.v);
    ctx.beginPath();
    ctx.arc(px,py,7,0,Math.PI*2);
    ctx.fillStyle=col;
    ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,0.9)';
    ctx.lineWidth=2;
    ctx.stroke();
    plotted.push({s,px,py});
  });

  updateStats(visible);
}

function updateStats(visible){
  const total=visible.reduce((a,s)=>a+s.v,0);
  const avg=total/visible.length;
  const top=visible.slice().sort((a,b)=>b.v-a.v)[0];
  const low=visible.slice().sort((a,b)=>a.v-b.v)[0];
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="stat-label">Stores</div><div class="stat-val">${visible.length}</div></div>
    <div class="stat"><div class="stat-label">Total revenue</div><div class="stat-val">${total.toFixed(1)} Cr</div></div>
    <div class="stat"><div class="stat-label">Avg / store</div><div class="stat-val">${avg.toFixed(1)} Cr</div></div>
    <div class="stat"><div class="stat-label">Top store</div><div class="stat-val" style="font-size:13px">${top.n}</div><div class="stat-sub" style="color:${COLOR(top.v)};font-weight:600">${top.v} Cr · ${LABEL(top.v)}</div></div>
    <div class="stat"><div class="stat-label">Lowest store</div><div class="stat-val" style="font-size:13px">${low.n}</div><div class="stat-sub" style="color:${COLOR(low.v)};font-weight:600">${low.v} Cr · ${LABEL(low.v)}</div></div>
  `;
}

const tip=document.getElementById('tooltip');
canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const sx=W/rect.width;
  const mx=(e.clientX-rect.left)*sx;
  const my=(e.clientY-rect.top)*sx;
  const hit=plotted.find(({px,py})=>Math.abs(px-mx)<11&&Math.abs(py-my)<11);
  if(hit){
    canvas.style.cursor='pointer';
    const{s}=hit;
    const lx=e.clientX-rect.left;
    const ly=e.clientY-rect.top;
    tip.style.display='block';
    tip.style.left=(lx+14)+'px';
    tip.style.top=(ly-8)+'px';
    tip.innerHTML=`<div style="font-weight:600;font-size:13px;margin-bottom:2px">${s.c}</div><div style="color:#666;font-size:11px;margin-bottom:5px">${s.n}</div><div style="font-size:14px;font-weight:700;color:${COLOR(s.v)}">${s.v.toFixed(2)} Cr</div><div style="font-size:11px;margin-top:2px;color:#555">${LABEL(s.v)} &nbsp;·&nbsp; ${s.r}</div>`;
  } else {
    canvas.style.cursor='crosshair';
    tip.style.display='none';
  }
});
canvas.addEventListener('mouseleave',()=>tip.style.display='none');

function filter(region){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  const idMap={'All':'btn-All','EWB 1':'btn-EWB1','EWB 2':'btn-EWB2','Jharkhand':'btn-JH','ENE':'btn-ENE','EOC':'btn-EOC'};
  const el=document.getElementById(idMap[region]);
  if(el)el.classList.add('active');
  drawMap(region);
}

drawMap('All');
</script>
